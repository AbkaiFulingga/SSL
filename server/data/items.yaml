items:
  - id: ration_card
    name: "a tattered ration card"
    description: "A creased card issued by the municipal authority, stamped with the puppet government's seal."
    takeable: true
  - id: brass_key
    name: "a small brass key"
    description: "Cold to the touch, with the number '42' engraved on the bow."
    takeable: true
  - id: photograph
    name: "a faded photograph of a family"
    description: "A man, a woman, and two children smile stiffly in a studio portrait. The edges are worn."
    takeable: true
  - id: truncheon
    name: "a police truncheon"
    description: "Heavy, with a leather wrist strap. Belongs to the Shanghai Municipal Police."
    takeable: true
  - id: newspaper
    name: "yesterday's newspaper"
    description: "The Shanghai Times, dated November 3, 1938. The headline screams of Chinese victories that never happened."
    takeable: true
